<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - HersStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Portal - HersStep</span>
            <span>Contact: admin@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="../index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="staff-dashboard.html">Dashboard</a></li>
                <li><a href="staff-products.html">Products</a></li>
                <li><a href="staff-orders.html">Orders</a></li>
                <li><a href="staff-reports.html">Reports</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Product Management</h1>
                <button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>
            </div>
            
            <div class="table" style="overflow-x: auto;">
                <table style="min-width: 800px;">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table">
                        <!-- Products loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Add Product</h2>
            
            <form id="product-form">
                <input type="hidden" id="product-id">
                
                <div class="form-group">
                    <label for="product-name">Product Name *</label>
                    <input type="text" id="product-name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="product-category">Category *</label>
                    <select id="product-category" class="form-control" required>
                        <option value="">Select Category</option>
                        <option value="Heels">Heels</option>
                        <option value="Flats">Flats</option>
                        <option value="Sneakers">Sneakers</option>
                        <option value="Sandals">Sandals</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="product-price">Price ($) *</label>
                    <input type="number" id="product-price" class="form-control" step="0.01" min="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="product-stock">Stock Quantity</label>
                    <input type="number" id="product-stock" class="form-control" min="0" value="0">
                </div>
                
                <div class="form-group">
                    <label for="product-description">Description *</label>
                    <textarea id="product-description" class="form-control" rows="4" required></textarea>
                </div>
                
                <div id="error-message" class="error-message" style="display: none;"></div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">Save Product</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Staff Portal</h3>
                <p>Internal use only</p>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function checkStaffAuth() {
            if (!store.currentUser || store.currentUser.role !== 'staff') {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function renderProducts() {
            const tbody = document.getElementById('products-table');
            const allProducts = products.getAll();
            
            if (allProducts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No products found</td></tr>';
                return;
            }
            
            tbody.innerHTML = allProducts.map(product => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span style="font-size: 1.5rem;">${product.image}</span>
                            <div>
                                <strong>${product.name}</strong><br>
                                <small style="color: var(--text-light);">${product.description.substring(0, 40)}...</small>
                            </div>
                        </div>
                    </td>
                    <td>${product.category}</td>
                    <td>${formatCurrency(product.price)}</td>
                    <td>
                        <span style="${product.stock < 10 ? 'color: var(--warning-color); font-weight: bold;' : ''}">
                            ${product.stock}
                        </span>
                    </td>
                    <td>⭐ ${product.rating}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="editProduct(${product.id})" style="padding: 0.25rem 0.5rem; margin-right: 0.25rem;">✏️</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${product.id})" style="padding: 0.25rem 0.5rem;">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function showAddProductModal() {
            document.getElementById('modal-title').textContent = 'Add Product';
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('product-modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
            document.getElementById('error-message').style.display = 'none';
        }
        
        function editProduct(productId) {
            const product = products.getById(productId);
            if (!product) return;
            
            document.getElementById('modal-title').textContent = 'Edit Product';
            document.getElementById('product-id').value = product.id;
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-category').value = product.category;
            document.getElementById('product-price').value = product.price;
            document.getElementById('product-stock').value = product.stock;
            document.getElementById('product-description').value = product.description;
            document.getElementById('product-modal').style.display = 'block';
        }
        
        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('product-id').value;
            const productData = {
                name: document.getElementById('product-name').value.trim(),
                category: document.getElementById('product-category').value,
                price: parseFloat(document.getElementById('product-price').value),
                stock: parseInt(document.getElementById('product-stock').value),
                description: document.getElementById('product-description').value.trim()
            };
            
            const errorEl = document.getElementById('error-message');
            const errors = products.validate(productData);
            
            if (errors.length > 0) {
                errorEl.textContent = errors.join(', ');
                errorEl.style.display = 'block';
                return;
            }
            
            if (productId) {
                products.update(parseInt(productId), productData);
                showNotification('Product updated successfully!', 'success');
            } else {
                products.add(productData);
                showNotification('Product added successfully!', 'success');
            }
            
            closeModal();
            renderProducts();
        });
        
        function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                products.remove(productId);
                showNotification('Product deleted!', 'success');
                renderProducts();
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('product-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        if (checkStaffAuth()) {
            renderProducts();
        }
    </script>
</body>
</html>
