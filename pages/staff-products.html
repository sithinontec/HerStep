<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Manage Products - HersStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Products Management</h1>
            <div class="card" style="margin-bottom:1rem;">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Add New Product</h2>
                    <div id="add-product-error" class="error-message" style="display:none;margin-bottom:0.5rem;"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                        <input id="new-name" class="form-control" placeholder="Product name">
                        <input id="new-category" class="form-control" placeholder="Category">
                        <input id="new-price" class="form-control" placeholder="Price" type="number" step="0.01">
                        <input id="new-stock" class="form-control" placeholder="Stock" type="number">
                        <input id="new-image" class="form-control" placeholder="Image (emoji)">
                        <input id="new-rating" class="form-control" placeholder="Rating" type="number" step="0.1" min="0" max="5">
                    </div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <input id="new-description" class="form-control" placeholder="Short description" style="flex:1;">
                        <button id="add-product-btn" class="btn btn-primary">Add Product</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Existing Products</h2>
                    <div id="products-list"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const listEl = document.getElementById('products-list');
        const addBtn = document.getElementById('add-product-btn');
        const addError = document.getElementById('add-product-error');

        function renderProducts() {
            if (!listEl) return;
            if (!store.products || store.products.length === 0) {
                listEl.innerHTML = '<div>No products found.</div>';
                return;
            }

            listEl.innerHTML = store.products.map(p => `
                <div class="product-row" data-id="${p.id}" style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #eee;">
                    <div style="flex:1;">
                        <strong>${p.image || '👟'} ${p.name}</strong>
                        <div style="font-size:0.9rem;color:#666">${p.category} · ${p.description || ''} · Rating: ${Number(p.rating || 0).toFixed(1)}</div>
                    </div>
                    <div style="width:140px;text-align:right">${formatCurrency(p.price)}<div style="font-size:0.9rem">stock: ${p.stock}</div></div>
                    <div style="width:180px;text-align:right">
                        <button class="btn" onclick="startEditProduct(${p.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function clearAddForm() {
            document.getElementById('new-name').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-stock').value = '';
            document.getElementById('new-description').value = '';
            document.getElementById('new-image').value = '';
            document.getElementById('new-rating').value = '';
            addError.style.display = 'none';
            addError.textContent = '';
        }

        addBtn.addEventListener('click', function() {
            // Clamp and parse inputs
            const rawPrice = parseFloat(document.getElementById('new-price').value);
            const priceVal = isNaN(rawPrice) ? 0 : Math.max(0, Math.round(rawPrice * 100) / 100);
            const rawStock = parseInt(document.getElementById('new-stock').value, 10);
            const stockVal = isNaN(rawStock) ? 0 : Math.max(0, rawStock);
            const rawR = parseFloat(document.getElementById('new-rating').value);
            const rVal = isNaN(rawR) ? 0 : Math.round(Math.max(0, Math.min(5, rawR)) * 10) / 10;

            const productData = {
                name: document.getElementById('new-name').value.trim(),
                category: document.getElementById('new-category').value.trim(),
                price: priceVal,
                stock: stockVal,
                description: document.getElementById('new-description').value.trim(),
                image: document.getElementById('new-image').value.trim() || '👟',
                rating: rVal
            };

            const errors = products.validate(productData);
            if (errors.length > 0) {
                addError.style.display = 'block';
                addError.textContent = errors.join('; ');
                return;
            }

            products.add(productData);
            showNotification('Product added', 'success');
            clearAddForm();
            renderProducts();
        });

        window.startEditProduct = function(id) {
            const row = document.querySelector(`.product-row[data-id="${id}"]`);
            const p = products.getById(id);
            if (!row || !p) return;

            row.innerHTML = `
                <div style="flex:1; display:grid; grid-template-columns: 1fr; gap:0.25rem;">
                    <input id="edit-name-${id}" class="form-control" value="${p.name}">
                    <input id="edit-category-${id}" class="form-control" value="${p.category}">
                    <input id="edit-description-${id}" class="form-control" value="${p.description}">
                </div>
                <div style="width:160px;text-align:right; display:grid; gap:0.25rem;">
                    <input id="edit-price-${id}" class="form-control" value="${p.price}" type="number" step="0.01">
                    <input id="edit-stock-${id}" class="form-control" value="${p.stock}" type="number">
                    <input id="edit-rating-${id}" class="form-control" value="${p.rating || 0}" type="number" step="0.1" min="0" max="5">
                </div>
                <div style="width:180px;text-align:right">
                    <button class="btn" onclick="saveEditProduct(${id})">Save</button>
                    <button class="btn btn-secondary" onclick="renderProducts()">Cancel</button>
                </div>
            `;
        };

        window.saveEditProduct = function(id) {
            const rawPrice2 = parseFloat(document.getElementById(`edit-price-${id}`).value);
            const priceVal2 = isNaN(rawPrice2) ? 0 : Math.max(0, Math.round(rawPrice2 * 100) / 100);
            const rawStock2 = parseInt(document.getElementById(`edit-stock-${id}`).value, 10);
            const stockVal2 = isNaN(rawStock2) ? 0 : Math.max(0, rawStock2);
            const rawR2 = parseFloat(document.getElementById(`edit-rating-${id}`).value);
            const rVal2 = isNaN(rawR2) ? 0 : Math.round(Math.max(0, Math.min(5, rawR2)) * 10) / 10;

            const updates = {
                name: document.getElementById(`edit-name-${id}`).value.trim(),
                category: document.getElementById(`edit-category-${id}`).value.trim(),
                description: document.getElementById(`edit-description-${id}`).value.trim(),
                price: priceVal2,
                stock: stockVal2,
                rating: rVal2
            };

            const errors = products.validate(updates, id);
            if (errors.length > 0) {
                showNotification(errors.join('; '), 'error');
                return;
            }

            products.update(id, updates);
            showNotification('Product updated', 'success');
            renderProducts();
        };

        window.deleteProduct = function(id) {
            if (!confirm('Delete this product?')) return;
            const ok = products.remove(id);
            if (ok) {
                showNotification('Product deleted', 'info');
                renderProducts();
            } else {
                showNotification('Failed to delete product', 'error');
            }
        };

        // Initial render
        renderProducts();
    </script>
</body>
</html>
