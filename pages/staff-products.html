<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Manage Products - HersStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Products Management</h1>
            <div class="card" style="margin-bottom:1rem;">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Add New Product</h2>
                    <div id="add-product-error" class="error-message" style="display:none;margin-bottom:0.5rem;"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                        <input id="new-name" class="form-control" placeholder="Product name">
                        <input id="new-category" class="form-control" placeholder="Category">
                        <input id="new-price" class="form-control" placeholder="Price" type="number" step="0.01">
                        <input id="new-stock" class="form-control" placeholder="Stock" type="number">
                        <input id="new-image" class="form-control" placeholder="Image (emoji)">
                        <input id="new-rating" class="form-control" placeholder="Rating" type="number" step="0.1" min="0" max="5">
                    </div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <input id="new-description" class="form-control" placeholder="Short description" style="flex:1;">
                        <button id="add-product-btn" class="btn btn-primary">Add Product</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Existing Products</h2>
                    
                    <!-- Filter and Sort Controls -->
                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center;">
                        <input id="filter-search" class="form-control" placeholder="Search products..." style="min-width:200px;">
                        <select id="filter-category" class="form-control" style="min-width:150px;">
                            <option value="">All Categories</option>
                        </select>
                        <select id="sort-by" class="form-control" style="min-width:150px;">
                            <option value="name">Sort by Name</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="stock-asc">Stock: Low to High</option>
                            <option value="stock-desc">Stock: High to Low</option>
                            <option value="rating">Sort by Rating</option>
                        </select>
                        <button id="save-all-btn" class="btn btn-success" style="display:none;">💾 Save All Changes</button>
                    </div>

                    <div id="products-list"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const listEl = document.getElementById('products-list');
        const addBtn = document.getElementById('add-product-btn');
        const addError = document.getElementById('add-product-error');
        const filterSearch = document.getElementById('filter-search');
        const filterCategory = document.getElementById('filter-category');
        const sortBy = document.getElementById('sort-by');
        const saveAllBtn = document.getElementById('save-all-btn');

        let editedProducts = new Set();

        // Populate category filter
        function populateCategories() {
            const categories = [...new Set(store.products.map(p => p.category))].sort();
            filterCategory.innerHTML = '<option value="">All Categories</option>' + 
                categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // Filter and sort products
        function getFilteredProducts() {
            let filtered = [...store.products];

            // Search filter
            const searchTerm = filterSearch.value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.category.toLowerCase().includes(searchTerm) ||
                    (p.description && p.description.toLowerCase().includes(searchTerm))
                );
            }

            // Category filter
            const selectedCategory = filterCategory.value;
            if (selectedCategory) {
                filtered = filtered.filter(p => p.category === selectedCategory);
            }

            // Sorting
            const sortValue = sortBy.value;
            filtered.sort((a, b) => {
                switch(sortValue) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'price-asc':
                        return a.price - b.price;
                    case 'price-desc':
                        return b.price - a.price;
                    case 'stock-asc':
                        return a.stock - b.stock;
                    case 'stock-desc':
                        return b.stock - a.stock;
                    case 'rating':
                        return (b.rating || 0) - (a.rating || 0);
                    default:
                        return 0;
                }
            });

            return filtered;
        }

        function renderProducts() {
            if (!listEl) return;
            const filtered = getFilteredProducts();
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="padding:1rem;text-align:center;color:#666;">No products found.</div>';
                return;
            }

            listEl.innerHTML = filtered.map(p => `
                <div class="product-row" data-id="${p.id}" style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #eee;${editedProducts.has(p.id) ? 'background-color:#fff3cd;' : ''}">
                    <div style="flex:1;">
                        <strong>${p.image || '👟'} ${p.name}</strong>
                        <div style="font-size:0.9rem;color:#666">${p.category} · ${p.description || ''} · Rating: ${Number(p.rating || 0).toFixed(1)}</div>
                    </div>
                    <div style="width:140px;text-align:right">${formatCurrency(p.price)}</div>
                    <div style="width:180px;text-align:center; display:flex; align-items:center; justify-content:center; gap:0.25rem;">
                        <button class="btn btn-sm" onclick="adjustStock(${p.id}, -1)">−</button>
                        <input type="number" min="0" value="${p.stock}" 
                            onchange="updateStockDirect(${p.id}, this.value)" 
                            onclick="this.select()"
                            style="width:60px;text-align:center;font-weight:bold;font-size:1.1rem;border:1px solid #ddd;border-radius:4px;padding:0.25rem;">
                        <button class="btn btn-sm" onclick="adjustStock(${p.id}, +1)">+</button>
                    </div>
                    <div style="width:180px;text-align:right; display:flex; gap:0.25rem; justify-content:flex-end;">
                        <button class="btn btn-sm" onclick="startEditProduct(${p.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.adjustStock = function(id, delta) {
            const p = products.getById(id);
            if (!p) return;
            
            const oldStock = p.stock;
            const newStock = Math.max(0, oldStock + delta);
            if (newStock !== oldStock) {
                products.update(id, { stock: newStock });
                editedProducts.add(id);
                updateSaveButton();
                renderProducts();
                showNotification(`Stock updated: ${p.name} (${oldStock} → ${newStock})`, 'success');
            }
        };

        window.updateStockDirect = function(id, newStockValue) {
            const p = products.getById(id);
            if (!p) return;
            
            const newStock = Math.max(0, parseInt(newStockValue, 10) || 0);
            if (newStock !== p.stock) {
                products.update(id, { stock: newStock });
                editedProducts.add(id);
                updateSaveButton();
                showNotification(`Stock updated: ${p.name} (${p.stock} → ${newStock})`, 'success');
                renderProducts();
            }
        };

        function markAsEdited() {
            // Mark that there are unsaved changes (use a special flag)
            editedProducts.add('__changes__');
            updateSaveButton();
        }

        function updateSaveButton() {
            saveAllBtn.style.display = editedProducts.size > 0 ? 'inline-block' : 'none';
            saveAllBtn.textContent = `💾 Save All Changes (${editedProducts.size})`;
        }

        function clearAddForm() {
            document.getElementById('new-name').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-stock').value = '';
            document.getElementById('new-description').value = '';
            document.getElementById('new-image').value = '';
            document.getElementById('new-rating').value = '';
            addError.style.display = 'none';
            addError.textContent = '';
        }

        // Filter event listeners
        filterSearch.addEventListener('input', renderProducts);
        filterCategory.addEventListener('change', renderProducts);
        sortBy.addEventListener('change', renderProducts);

        // Save all button
        saveAllBtn.addEventListener('click', function() {
            products.saveProducts();
            editedProducts.clear();
            updateSaveButton();
            showNotification('All changes saved successfully!', 'success');
            populateCategories();
            renderProducts();
        });

        // Auto-save to localStorage on add/delete (optional - can be removed if you prefer manual save only)
        // For now, we keep manual save but track all changes

        addBtn.addEventListener('click', function() {
            // Clamp and parse inputs
            const rawPrice = parseFloat(document.getElementById('new-price').value);
            const priceVal = isNaN(rawPrice) ? 0 : Math.max(0, Math.round(rawPrice * 100) / 100);
            const rawStock = parseInt(document.getElementById('new-stock').value, 10);
            const stockVal = isNaN(rawStock) ? 0 : Math.max(0, rawStock);
            const rawR = parseFloat(document.getElementById('new-rating').value);
            const rVal = isNaN(rawR) ? 0 : Math.round(Math.max(0, Math.min(5, rawR)) * 10) / 10;

            const productData = {
                name: document.getElementById('new-name').value.trim(),
                category: document.getElementById('new-category').value.trim(),
                price: priceVal,
                stock: stockVal,
                description: document.getElementById('new-description').value.trim(),
                image: document.getElementById('new-image').value.trim() || '👟',
                rating: rVal
            };

            const errors = products.validate(productData);
            if (errors.length > 0) {
                addError.style.display = 'block';
                addError.textContent = errors.join('; ');
                return;
            }

            products.add(productData);
            markAsEdited('new'); // Mark that there are changes
            showNotification('Product added - don\'t forget to save all changes!', 'success');
            clearAddForm();
            populateCategories(); // Refresh categories in case new category was added
            renderProducts();
        });

        window.startEditProduct = function(id) {
            const row = document.querySelector(`.product-row[data-id="${id}"]`);
            const p = products.getById(id);
            if (!row || !p) return;

            row.innerHTML = `
                <div style="flex:1; display:grid; grid-template-columns: 1fr; gap:0.25rem;">
                    <input id="edit-name-${id}" class="form-control" value="${p.name}">
                    <input id="edit-category-${id}" class="form-control" value="${p.category}">
                    <input id="edit-description-${id}" class="form-control" value="${p.description}">
                </div>
                <div style="width:160px;text-align:right; display:grid; gap:0.25rem;">
                    <input id="edit-price-${id}" class="form-control" value="${p.price}" type="number" step="0.01">
                    <input id="edit-stock-${id}" class="form-control" value="${p.stock}" type="number">
                    <input id="edit-rating-${id}" class="form-control" value="${p.rating || 0}" type="number" step="0.1" min="0" max="5">
                </div>
                <div style="width:220px;text-align:right; display:flex; gap:0.25rem; justify-content:flex-end;">
                    <button class="btn btn-success" onclick="saveEditProduct(${id})">Save</button>
                    <button class="btn btn-secondary" onclick="renderProducts()">Cancel</button>
                </div>
            `;
        };

        window.saveEditProduct = function(id) {
            const rawPrice2 = parseFloat(document.getElementById(`edit-price-${id}`).value);
            const priceVal2 = isNaN(rawPrice2) ? 0 : Math.max(0, Math.round(rawPrice2 * 100) / 100);
            const rawStock2 = parseInt(document.getElementById(`edit-stock-${id}`).value, 10);
            const stockVal2 = isNaN(rawStock2) ? 0 : Math.max(0, rawStock2);
            const rawR2 = parseFloat(document.getElementById(`edit-rating-${id}`).value);
            const rVal2 = isNaN(rawR2) ? 0 : Math.round(Math.max(0, Math.min(5, rawR2)) * 10) / 10;

            const updates = {
                name: document.getElementById(`edit-name-${id}`).value.trim(),
                category: document.getElementById(`edit-category-${id}`).value.trim(),
                description: document.getElementById(`edit-description-${id}`).value.trim(),
                price: priceVal2,
                stock: stockVal2,
                rating: rVal2
            };

            const errors = products.validate(updates, id);
            if (errors.length > 0) {
                showNotification(errors.join('; '), 'error');
                return;
            }

            products.update(id, updates);
            editedProducts.add(id);
            updateSaveButton();
            showNotification('Product updated - don\'t forget to save all changes!', 'success');
            renderProducts();
        };

        // Track when products are loaded to ensure save button shows for any changes

        window.deleteProduct = function(id) {
            if (!confirm('Delete this product?')) return;
            const ok = products.remove(id);
            if (ok) {
                editedProducts.delete(id); // Remove from edited set if it was there
                markAsEdited('delete'); // Mark that there are changes
                showNotification('Product deleted - don\'t forget to save all changes!', 'info');
                populateCategories(); // Refresh categories in case last product of category was deleted
                renderProducts();
            } else {
                showNotification('Failed to delete product', 'error');
            }
        };

        // Initial render
        populateCategories();
        renderProducts();
    </script>
</body>
</html>
