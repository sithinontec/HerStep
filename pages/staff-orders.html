<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Orders - HersStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>All Orders</h1>
            <div class="card">
                <div class="card-body">
                    <div id="orders-list">Loading orders...</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const list = document.getElementById('orders-list');
        if (store.orders && list) {
            if (store.orders.length === 0) list.textContent = 'No orders yet.';
            else {
                list.innerHTML = store.orders.map(o => `
                    <div style="border-bottom:1px solid #eee; padding:0.5rem 0;">
                        <div><strong>${o.id}</strong> — ${o.status} — ${new Date(o.createdAt).toLocaleString()}</div>
                        <div>Items: ${o.items.map(i => i.name + ' x' + i.quantity).join(', ')}</div>
                        <div>Total: ${formatCurrency(o.total)}</div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
