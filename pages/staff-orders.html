<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - HersStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Portal - HersStep</span>
            <span>Contact: admin@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="../index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="staff-dashboard.html">Dashboard</a></li>
                <li><a href="staff-products.html">Products</a></li>
                <li><a href="staff-orders.html">Orders</a></li>
                <li><a href="staff-reports.html">Reports</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 style="margin-bottom: 2rem;">Order Management</h1>
            
            <!-- Filters -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="form-group">
                        <label for="status-filter">Status</label>
                        <select id="status-filter" class="form-control">
                            <option value="">All Statuses</option>
                            <option value="placed">Placed</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="search-order">Search Order ID</label>
                        <input type="text" id="search-order" class="form-control" placeholder="ORD-...">
                    </div>
                </div>
            </div>
            
            <div class="table" style="overflow-x: auto;">
                <table style="min-width: 1000px;">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Date</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                        <!-- Orders loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Order Details Modal -->
    <div id="order-modal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom: 1.5rem;">Order Details</h2>
            
            <div id="order-details-content">
                <!-- Order details loaded dynamically -->
            </div>
            
            <div style="margin-top: 1.5rem;">
                <h3 style="margin-bottom: 0.5rem;">Update Status</h3>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="updateOrderStatus('placed')">Placed</button>
                    <button class="btn btn-secondary" onclick="updateOrderStatus('processing')">Processing</button>
                    <button class="btn btn-secondary" onclick="updateOrderStatus('shipped')">Shipped</button>
                    <button class="btn btn-secondary" onclick="updateOrderStatus('delivered')">Delivered</button>
                    <button class="btn btn-danger" onclick="updateOrderStatus('cancelled')">Cancel Order</button>
                </div>
            </div>
            
            <div style="margin-top: 1.5rem;">
                <h3 style="margin-bottom: 0.5rem;">Customer Communication</h3>
                <button class="btn btn-secondary" onclick="contactCustomer()">📧 Contact Customer</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Staff Portal</h3>
                <p>Internal use only</p>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        let currentOrderId = null;
        let filteredOrders = [...store.orders];
        
        function checkStaffAuth() {
            if (!store.currentUser || store.currentUser.role !== 'staff') {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function renderOrders() {
            const tbody = document.getElementById('orders-table');
            
            if (filteredOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No orders found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredOrders.map(order => `
                <tr>
                    <td><strong>${order.id}</strong></td>
                    <td>${getCustomerName(order.userId)}</td>
                    <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                    <td>${order.items.length} items</td>
                    <td>${formatCurrency(order.total)}</td>
                    <td>
                        <span style="padding: 0.25rem 0.75rem; background: ${getStatusColor(order.status)}; color: white; border-radius: 20px; font-size: 0.875rem;">
                            ${order.status.toUpperCase()}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-primary" onclick="viewOrder('${order.id}')" style="padding: 0.25rem 0.5rem;">View</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getCustomerName(userId) {
            const user = store.users.find(u => u.id === userId);
            return user ? `${user.firstName} ${user.lastName}` : 'Unknown';
        }
        
        function getStatusColor(status) {
            const colors = {
                'placed': 'var(--primary-color)',
                'processing': 'var(--warning-color)',
                'shipped': '#2196f3',
                'delivered': 'var(--success-color)',
                'cancelled': 'var(--error-color)'
            };
            return colors[status] || 'var(--text-light)';
        }
        
        function filterOrders() {
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-order').value.toLowerCase();
            
            filteredOrders = store.orders.filter(order => {
                if (status && order.status !== status) return false;
                if (search && !order.id.toLowerCase().includes(search)) return false;
                return true;
            });
            
            renderOrders();
        }
        
        function viewOrder(orderId) {
            currentOrderId = orderId;
            const order = store.orders.find(o => o.id === orderId);
            if (!order) return;
            
            const user = store.users.find(u => u.id === order.userId);
            const content = document.getElementById('order-details-content');
            
            content.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div>
                        <strong>Order ID:</strong><br>${order.id}<br><br>
                        <strong>Date:</strong><br>${new Date(order.createdAt).toLocaleString()}<br><br>
                        <strong>Status:</strong><br><span style="color: ${getStatusColor(order.status)}">${order.status.toUpperCase()}</span>
                    </div>
                    <div>
                        <strong>Customer:</strong><br>${user ? user.firstName + ' ' + user.lastName : 'Unknown'}<br>
                        <strong>Email:</strong><br>${user ? user.email : 'N/A'}<br>
                        <strong>Payment:</strong><br>${order.paymentMethod}
                    </div>
                </div>
                
                <h3 style="margin-bottom: 0.5rem;">Items</h3>
                <table class="table" style="margin-bottom: 1rem;">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${order.items.map(item => `
                            <tr>
                                <td>${item.name}</td>
                                <td>${item.quantity}</td>
                                <td>${formatCurrency(item.price)}</td>
                                <td>${formatCurrency(item.price * item.quantity)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <div style="text-align: right; font-size: 1.25rem; font-weight: bold;">
                    Total: <span style="color: var(--primary-color);">${formatCurrency(order.total)}</span>
                </div>
                
                <h3 style="margin: 1.5rem 0 0.5rem;">Shipping Address</h3>
                <p>
                    ${order.shippingAddress.fullName}<br>
                    ${order.shippingAddress.address}<br>
                    ${order.shippingAddress.city}, ${order.shippingAddress.zipCode}
                </p>
            `;
            
            document.getElementById('order-modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('order-modal').style.display = 'none';
            currentOrderId = null;
        }
        
        function updateOrderStatus(newStatus) {
            if (!currentOrderId) return;
            
            if (newStatus === 'cancelled' && !confirm('Are you sure you want to cancel this order?')) {
                return;
            }
            
            orders.updateStatus(currentOrderId, newStatus);
            showNotification('Order status updated!', 'success');
            closeModal();
            renderOrders();
        }
        
        function contactCustomer() {
            if (!currentOrderId) return;
            const order = store.orders.find(o => o.id === currentOrderId);
            const user = store.users.find(u => u.id === order.userId);
            
            const message = prompt(`Send message to ${user ? user.email : 'customer'}:`);
            if (message) {
                showNotification('Message sent to customer!', 'success');
            }
        }
        
        // Event listeners
        document.getElementById('status-filter').addEventListener('change', filterOrders);
        document.getElementById('search-order').addEventListener('input', filterOrders);
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('order-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        if (checkStaffAuth()) {
            renderOrders();
        }
    </script>
</body>
</html>
