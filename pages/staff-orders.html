<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Orders - HerStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Styled status badge and select for staff orders */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            text-transform: capitalize;
            min-width: 70px;
            text-align: center;
        }
        .status-placed { background: #1976d2; }
        .status-processing { background: #fb8c00; }
        .status-shipped { background: #0288d1; }
        .status-delivered { background: #2e7d32; }
        .status-cancelled { background: #c62828; }

        .status-select {
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
            font-weight: 600;
            color: #333;
        }
        .order-row-controls { display:flex; align-items:center; gap:0.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@herstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HerStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li id="order-nav-item" style="display: none;"><a href="#" id="order-nav-link">Order</a></li>
                <li id="dashboard-nav-item" style="display: none;"><a href="staff-dashboard.html">Dashboard</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>All Orders</h1>
            <div class="card">
                <div class="card-body">
                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; align-items:center;">
                        <input id="orders-search" class="form-control" placeholder="Search orders by id, customer, or item..." style="min-width:200px;">
                        <select id="orders-status-filter" class="form-control" style="min-width:150px;">
                            <option value="">All Statuses</option>
                            <option value="placed">Placed</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div id="orders-list">Loading orders...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer removed for staff orders -->

    <script src="../js/app.js"></script>
    <script>
        if (typeof store === 'undefined') {
            const el = document.getElementById('orders-list');
            if (el) el.textContent = 'Application failed to load (store missing). Check console for errors.';
            throw new Error('store is undefined; app.js may have failed to load');
        }

        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const list = document.getElementById('orders-list');

        // Render orders from store.orders with search & status filtering
        function renderOrders() {
            if (!list) return;
            const raw = (store.orders || []).slice();
            // Apply filters
            const searchVal = (document.getElementById('orders-search')?.value || '').trim().toLowerCase();
            const statusFilter = (document.getElementById('orders-status-filter')?.value || '');

            let arr = raw.filter(o => {
                if (statusFilter && String(o.status || '').toLowerCase() !== statusFilter.toLowerCase()) return false;
                if (!searchVal) return true;
                // Match id, order_number, user email/name, item names
                const idMatch = String(o.id || '').toLowerCase().includes(searchVal) || String(o.order_number || '').toLowerCase().includes(searchVal);
                const userMatch = (o.userEmail || o.user?.email || '').toLowerCase().includes(searchVal) || ((o.userFirstName || o.user?.firstName || '') + ' ' + (o.userLastName || o.user?.lastName || '')).toLowerCase().includes(searchVal);
                const itemsMatch = Array.isArray(o.items) && o.items.some(it => (it.name || '').toLowerCase().includes(searchVal));
                return idMatch || userMatch || itemsMatch;
            }).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            if (arr.length === 0) {
                list.textContent = 'No orders yet.';
                return;
            }

                    list.innerHTML = arr.map(o => `
                <div class="order-row" style="border-bottom:1px solid #eee; padding:0.5rem 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>${o.id}</strong> — ${o.createdAt ? new Date(o.createdAt).toLocaleString() : '—'}</div>
                        <div class="order-row-controls">
                            <span class="status-badge status-${o.status}">${o.status}</span>
                            <select class="status-select" onchange="changeOrderStatus('${o.id}', this.value)">
                                <option value="placed" ${o.status==='placed' ? 'selected' : ''}>Placed</option>
                                <option value="processing" ${o.status==='processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${o.status==='shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${o.status==='delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${o.status==='cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top:0.5rem;">Items: ${o.items && o.items.length ? o.items.map(i => i.name + ' x' + i.quantity).join(', ') : '—'}</div>
                    <div>Total: ${formatCurrency(o.total || 0)}</div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <a class="btn btn-secondary" href="order-details.html?orderId=${o.id}">View</a>
                        ${o.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}')">Cancel</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Fetch orders from API and populate store.orders
        async function fetchOrdersFromApi() {
            try {
                const res = await fetch((window.API_BASE || '') + '/api/orders');
                const data = await res.json();
                if (Array.isArray(data)) {
                    store.orders = data;
                    renderOrders();
                } else {
                    list.textContent = 'Failed to load orders';
                }
            } catch (err) {
                console.error('Failed to fetch orders', err);
                // fallback to local orders stored by the client
                if (typeof orders !== 'undefined' && typeof orders.loadOrders === 'function') {
                    orders.loadOrders().then(() => renderOrders()).catch(() => { list.textContent = 'Failed to load orders'; });
                } else {
                    list.textContent = 'Failed to load orders';
                }
            }
        }

        // Wire up search & filter inputs
        document.getElementById('orders-search')?.addEventListener('input', renderOrders);
        document.getElementById('orders-status-filter')?.addEventListener('change', renderOrders);

        // Save current store.orders array to API (PUT /api/orders)
        async function saveOrdersToApi() {
            try {
                await fetch((window.API_BASE || '') + '/api/orders', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(store.orders || [])
                });
                // refresh from API to pick up any server-side transformations
                await fetchOrdersFromApi();
                return true;
            } catch (err) {
                console.error('Failed to save orders', err);
                // fallback to saving locally
                if (typeof orders !== 'undefined' && typeof orders.save === 'function') {
                    orders.save();
                    return true;
                }
                return false;
            }
        }

        window.changeOrderStatus = async function(orderId, status) {
            if (!orderId) return;
            if (status === 'cancelled') {
                if (!confirm('Cancel this order? This will restore stock.')) {
                    renderOrders();
                    return;
                }
                // update locally and persist
                const ok = await orders.cancel(orderId);
                if (ok) {
                    showNotification('Order cancelled', 'success');
                    saveOrdersToApi();
                } else {
                    showNotification('Failed to cancel order', 'error');
                }
            } else {
                if (!confirm('Change order status to "' + status + '"?')) {
                    renderOrders();
                    return;
                }
                const ok = await orders.updateStatus(orderId, status);
                if (ok) {
                    showNotification('Order status updated', 'success');
                    saveOrdersToApi();
                } else {
                    showNotification('Failed to update status', 'error');
                }
            }
            renderOrders();
        };

        window.cancelOrder = async function(orderId) {
            if (!orderId) return;
            if (!confirm('Are you sure you want to cancel this order?')) return;
            const ok = await orders.cancel(orderId);
            if (ok) {
                showNotification('Order cancelled', 'success');
                saveOrdersToApi();
            } else {
                showNotification('Failed to cancel order', 'error');
            }
        };

        // Initial load from API
        fetchOrdersFromApi();
    </script>
</body>
</html>
